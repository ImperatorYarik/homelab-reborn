- name: Pre-configuration [ALL nodes]
  hosts: all
  become: yes
  roles:
    - common

- name: Setup K3S control plane
  hosts: control-plane
  become: yes
  roles:
    - k3s-master-role

- name: Setup K3S workers
  hosts: workers
  become: yes
  roles:
    - k3s-worker-role

- name: Setup ArgoCD
  hosts: control-plane
  become: yes
  roles:
    - argocd