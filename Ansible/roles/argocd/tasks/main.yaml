- name: Download ArgoCD install manifest
  ansible.builtin.get_url:
    url: "https://raw.githubusercontent.com/argoproj/argo-cd/{{ argocd_version }}/manifests/install.yaml"
    dest: "{{ argocd_manifest_dest }}"
    force: false

- name: Create argocd namespace
  ansible.builtin.command:
    cmd: kubectl create namespace {{ argocd_namespace }}
  register: ns_result
  failed_when:
    - ns_result.rc != 0
    - "'AlreadyExists' not in ns_result.stderr"
  changed_when: ns_result.rc == 0
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Apply ArgoCD manifests
  ansible.builtin.command:
    cmd: kubectl apply -n {{ argocd_namespace }} -f {{ argocd_manifest_dest }}
  register: argocd_apply
  changed_when: "'configured' in argocd_apply.stdout or 'created' in argocd_apply.stdout"
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Expose argocd-server as NodePort
  ansible.builtin.command:
    cmd: >
      kubectl patch svc argocd-server -n {{ argocd_namespace }}
      --type=merge -p '{"spec":{"type":"NodePort"}}'
  changed_when: false
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Wait for argocd-redis rollout
  ansible.builtin.command:
    cmd: kubectl rollout status deployment/argocd-redis -n {{ argocd_namespace }} --timeout=300s
  changed_when: false
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Wait for argocd-repo-server rollout
  ansible.builtin.command:
    cmd: kubectl rollout status deployment/argocd-repo-server -n {{ argocd_namespace }} --timeout=300s
  changed_when: false
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Wait for argocd-application-controller rollout
  ansible.builtin.command:
    cmd: kubectl rollout status statefulset/argocd-application-controller -n {{ argocd_namespace }} --timeout=300s
  changed_when: false
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Wait for argocd-server rollout
  ansible.builtin.command:
    cmd: kubectl rollout status deployment/argocd-server -n {{ argocd_namespace }} --timeout=300s
  changed_when: false
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Get argocd-server NodePort
  ansible.builtin.command:
    cmd: kubectl get svc argocd-server -n {{ argocd_namespace }} -o jsonpath='{.spec.ports[?(@.port==443)].nodePort}'
  register: argocd_nodeport
  changed_when: false
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Get initial admin password
  ansible.builtin.command:
    cmd: kubectl -n {{ argocd_namespace }} get secret argocd-initial-admin-secret -o jsonpath="{.data.password}"
  register: argocd_password_b64
  changed_when: false
  no_log: true
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Display ArgoCD access info
  ansible.builtin.debug:
    msg:
      - "ArgoCD UI:        https://{{ ansible_host }}:{{ argocd_nodeport.stdout }}"
      - "Username:         admin"
      - "Initial password: {{ argocd_password_b64.stdout | b64decode }}"
