apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: [ROOT-APP]
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:ImperatorYarik/homelab-reborn.git
    targetRevision: development
    path: apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true